[workspace]
authors = ["Shlok Natarajan <shlok.natarajan@gmail.com>"]
channels = ["conda-forge"]
name = "clinpgx-term-lookup"
platforms = ["osx-arm64"]
version = "0.1.0"

[tasks]
clinpgx-term-lookup = { cmd = "python -m clinpgx_term_lookup.term_lookup" }

[dependencies]
pydantic = ">=2.11.7,<3"
requests = ">=2.32.4,<3"
loguru = ">=0.7.3,<0.8"

[feature.dev.dependencies]
ipykernel = ">=6.30.1,<7"
black = ">=25.1.0,<26"
python-build = ">=1.2.0"
twine = ">=5.0.0"

[environments]
default = ["dev"]